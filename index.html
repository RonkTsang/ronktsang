<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ronk Tsang builds AI-native interfaces with a focus on real-time interaction and content creation."
    />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#f6f4ef"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#151412"
    />
    <title>Ronk Tsang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Short+Stack&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="layout">
        <header class="hero fade-in" aria-labelledby="name-heading">
          <p class="kicker">Building AI-native interfaces</p>
          <h1 id="name-heading">Ronk Tsang</h1>
        </header>

        <div class="content">
          <section class="section section-note fade-in fade-in-delay-1" aria-labelledby="about-heading">
            <h2 id="about-heading" class="sr-only">About</h2>
            <p>
              Exploring real-time interaction and content creation in the age of
              AI.
            </p>
          </section>

          <section
            class="section section-principles fade-in fade-in-delay-2"
            aria-labelledby="principles-heading"
          >
            <h2 id="principles-heading" class="section-title">Principles</h2>
            <ul class="principles">
              <li>Think long-term</li>
              <li>Build for compounding</li>
              <li>Keep things simple</li>
            </ul>
          </section>

          <section
            class="section section-contact fade-in fade-in-delay-3"
            aria-labelledby="contact-heading"
          >
            <h2 id="contact-heading" class="sr-only">Contact</h2>
            <address class="contact-list">
              <a href="mailto:ronktsang@gmail.com" aria-label="Email">
                <svg
                  viewBox="0 0 24 24"
                  aria-hidden="true"

                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.6"
                  />
                  <path
                    d="m4 7 8 6 8-6"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.6"
                  />
                </svg>
              </a>
              <a
                href="https://github.com/ronktsang"
                aria-label="GitHub"
                target="_blank"
                rel="noreferrer"
              >
                <svg
                  viewBox="0 0 24 24"
                  aria-hidden="true"

</html>
